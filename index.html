<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Números</title>
</head>

<body>
    <h1>Validação de Números</h1>
    <form id="numeroForm">
        <label for="numeroA">Número A:</label>
        <input type="number" id="numeroA" name="numeroA" required>
        <br>
        <label for="numeroB">Número B:</label>
        <input type="number" id="numeroB" name="numeroB" required>
        <br>
        <button type="button" id="submitButton">Submeter</button>
    </form>
    <div id="mensagem"></div>

    <script src="main.js"></script>
</body>

</html>
